name: Dockerfile
on:
  push:
    branches: [ master, my-version ]
  pull_request:
    branches: [ master, my-version ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    name: ubuntu-latest
    steps:
    - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # 2026-1-9
    
    - run: docker build . --file Dockerfile
